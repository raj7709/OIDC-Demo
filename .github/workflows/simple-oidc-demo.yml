name: Simple OIDC Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Display JWT Token (Educational Demo)
        uses: actions/github-script@v7
        with:
          script: |
            // Get the OIDC token
            const token = await core.getIDToken('sts.amazonaws.com');
            
            console.log('==========================================');
            console.log('JWT Token Structure:');
            console.log('==========================================');
            
            // Split token into parts
            const parts = token.split('.');
            console.log('Header.Payload.Signature');
            console.log('');
            console.log('Full Token:');
            console.log(token);
            console.log('');
            
            // Show token parts separated by dots
            console.log('==========================================');
            console.log('Token Parts Breakdown:');
            console.log('==========================================');
            if (parts.length === 3) {
              console.log('Header (Part 1):');
              console.log(parts[0]);
              console.log('');
              console.log('Payload (Part 2):');
              console.log(parts[1]);
              console.log('');
              console.log('Signature (Part 3):');
              console.log(parts[2]);
              console.log('');
            }
            
            console.log('==========================================');
            console.log('Decoded Payload (Claims):');
            console.log('==========================================');
            
            // Decode and display the payload
            if (parts.length === 3) {
              try {
                const payload = JSON.parse(Buffer.from(parts[1], 'base64').toString());
                console.log(JSON.stringify(payload, null, 2));
              } catch (e) {
                console.log('Error decoding payload:', e.message);
              }
            } else {
              console.log('Invalid JWT format');
            }

      - name: Upload demo file to S3
        run: |
          echo "Hello from GitHub OIDC demo" > oidc-demo.txt
          aws s3 cp oidc-demo.txt s3://${S3_BUCKET}/oidc-demo.txt

      - name: List S3 bucket contents
        run: aws s3 ls s3://${S3_BUCKET}/
