name: Simple OIDC Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Display JWT Token (Educational Demo)
        run: |
          TOKEN=$(curl -s "$ACTIONS_ID_TOKEN_REQUEST_URL?audience=sts.amazonaws.com" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r '.token')
          
          echo "=========================================="
          echo "JWT Token Structure:"
          echo "=========================================="
          echo "Header.Payload.Signature"
          echo ""
          echo "Full Token:"
          echo "$TOKEN"
          echo ""
          echo "=========================================="
          echo "Decoded Payload (Claims):"
          echo "=========================================="
          echo "$TOKEN" | cut -d. -f2 | base64 -d | jq '.'

      - name: Upload demo file to S3
        run: |
          echo "Hello from GitHub OIDC demo" > oidc-demo.txt
          aws s3 cp oidc-demo.txt s3://${S3_BUCKET}/oidc-demo.txt

      - name: List S3 bucket contents
        run: aws s3 ls s3://${S3_BUCKET}/
